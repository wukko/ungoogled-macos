name: Bump helium-chromium submodule to latest version

on: workflow_dispatch

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with: { submodules: true, fetch-depth: 0 }

      - name: Update helium-chromium submodule
        run: |
          git submodule update --remote helium-chromium
          git status --short
